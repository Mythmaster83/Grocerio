name: grocer
description: "Production-grade grocery & stock list manager."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State management ---
  flutter_riverpod: ^2.5.1

  # --- Local storage ---
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # --- Networking ---
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # --- Security / config ---
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.2.2

  # --- Voice input ---
  speech_to_text: ^7.0.0

  # --- Images ---
  cached_network_image: ^3.3.1

  # --- UX / utils ---
  flutter_slidable: ^3.1.1     # swipe-to-edit
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0
  equatable: ^2.0.5
  url_launcher: ^6.3.2
  flutter_local_notifications: ^22.1.0
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/fonts/
